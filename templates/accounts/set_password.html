{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background-color: var(--bg-base);">
    <div class="card p-4"
        style="background-color: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 20px; max-width: 440px; width: 100%;">
        <div class="text-center mb-4">
            <div class="d-flex align-items-center justify-content-center mb-3">
                <img src="{% static 'img/logo-icon.png' %}" alt="AloCentra Logo" height="40" class="me-2">
                <span class="fw-bolder"
                    style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem; letter-spacing: -0.5px;">
                    <span style="color: var(--text-primary); font-weight: 600;">Alo</span><span
                        style="color: var(--text-primary); font-weight: 800;">Centra</span>
                </span>
            </div>
            <h4 class="fw-bold" style="color: var(--text-primary);">Set Your Password</h4>
            <p style="color: var(--text-secondary);" class="small">Welcome to AloCentra. Set a password to activate your
                account.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 position-relative">
                <label class="form-label text-secondary small">Password</label>
                <input type="password" name="password" id="setPassword" class="form-control pe-5" required
                    minlength="8">
                <button type="button"
                    class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-secondary text-decoration-none mt-2"
                    onclick="togglePassword('setPassword', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="mb-4 position-relative">
                <label class="form-label text-secondary small">Confirm Password</label>
                <input type="password" name="confirm_password" id="setConfigPassword" class="form-control pe-5" required
                    minlength="8">
                <button type="button"
                    class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-secondary text-decoration-none mt-2"
                    onclick="togglePassword('setConfigPassword', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-bold">Set Password</button>
        </form>
    </div>
</div>

<script>
    function togglePassword(inputId, btnElement) {
        const input = document.getElementById(inputId);
        const icon = btnElement.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
</script>
{% endblock %}
