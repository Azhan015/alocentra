{% for s in specialisations %}
<tr style="border-bottom: 1px solid var(--border-subtle);">
    <td class="fw-bold">{{ s.name }}</td>
    <td>{{ s.program.name }}</td>
    <td>{{ s.program.department.name }}</td>
    <td class="text-end">
        <button type="button" class="btn btn-link btn-sm text-primary p-0 me-2" onclick="editSpec({{ s.id }})">Edit</button>
        <button type="button" class="btn btn-link btn-sm p-0" style="color: var(--accent);" onclick="delSpec({{ s.id }}, '{{ s.name|escapejs }}')">Delete</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="4" class="text-secondary text-center py-4">No specialisations yet.</td>
</tr>
{% endfor %}
