{% for e in exam_types %}
<tr style="border-bottom: 1px solid var(--border-subtle);">
    <td class="fw-bold">{{ e.name }}</td>
    <td>{{ e.exam_program_type|default:"—" }}</td>
    <td>{{ e.duration_hours }}h {{ e.duration_minutes }}m</td>
    <td>
        {% if e.default_start_time %}
            <span class="badge" style="background: rgba(0,201,167,0.15); color: var(--secondary); border: 1px solid var(--secondary);">
                <i class="bi bi-clock me-1"></i>{{ e.default_start_time|time:"h:i A" }}
            </span>
        {% else %}
            <span class="text-secondary small">—</span>
        {% endif %}
    </td>
    <td class="text-end">
        <button type="button" class="btn btn-link btn-sm text-primary p-0 me-2" onclick="editExam({{ e.id }})">Edit</button>
        <button type="button" class="btn btn-link btn-sm p-0" style="color: var(--accent);" onclick="delExam({{ e.id }}, '{{ e.name|escapejs }}')">Delete</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="text-secondary text-center py-4">No exam types yet.</td>
</tr>
{% endfor %}
