{% for d in departments %}
<tr style="border-bottom: 1px solid var(--border-subtle);">
    <td class="fw-bold">{{ d.name }}</td>
    <td class="text-end">
        <button type="button" class="btn btn-link btn-sm text-primary p-0 me-2" onclick="editDept({{ d.id }})">Edit</button>
        <button type="button" class="btn btn-link btn-sm p-0" style="color: var(--accent);" onclick="delDept({{ d.id }}, '{{ d.name|escapejs }}')">Delete</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="2" class="text-secondary text-center py-4">No departments yet.</td>
</tr>
{% endfor %}
