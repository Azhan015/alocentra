{% if is_paginated %}
<nav aria-label="Page navigation" class="mt-4">
    <ul class="pagination justify-content-center">
        {% if page_obj.has_previous %}
        <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.previous_page_number }}"
                style="background-color: var(--bg-elevated); color: var(--primary); border: 1px solid var(--border-subtle); border-radius: 50%;">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        {% else %}
        <li class="page-item disabled">
            <a class="page-link" href="#"
                style="background-color: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-subtle); border-radius: 50%;">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        {% endif %}

        <li class="page-item disabled d-flex align-items-center mx-3">
            <span class="text-secondary small">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
        </li>

        {% if page_obj.has_next %}
        <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.next_page_number }}"
                style="background-color: var(--bg-elevated); color: var(--primary); border: 1px solid var(--border-subtle); border-radius: 50%;">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
        {% else %}
        <li class="page-item disabled">
            <a class="page-link" href="#"
                style="background-color: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-subtle); border-radius: 50%;">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
