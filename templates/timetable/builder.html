{% extends 'base_dashboard.html' %}
{% block dashboard_content %}
<div class="mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h3 class="fw-bold m-0" style="color: var(--text-primary);">Timetable Builder</h3>
        <p class="text-secondary mt-1 mb-0">{% if timetable %}Editing {{ timetable.exam_type.name }}{% else %}Create new
            schedule{% endif %}</p>
    </div>
    <div class="d-flex gap-2">
        <a href="{% url 'timetable:list' %}" class="btn btn-outline-secondary d-flex align-items-center">
            <i class="bi bi-arrow-left me-2"></i> ← Back to Timetables
        </a>
        <button class="btn btn-outline-custom" onclick="exportExcel()"><i class="bi bi-file-earmark-spreadsheet me-2"></i>Export Excel</button>
        <button class="btn btn-outline-custom" onclick="exportPDF()"><i class="bi bi-file-earmark-pdf me-2"></i>Export PDF</button>
        <button class="btn btn-primary-custom" onclick="saveTimetable()"><i class="bi bi-save me-2"></i> Save Timetable</button>
    </div>
</div>

<div class="card bg-surface border-subtle radius-card shadow-card p-4 mb-4"
    style="background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px;">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label text-secondary small text-uppercase fw-bold">Exam Type</label>
            <select id="exam_type" class="form-select bg-elevated border-subtle text-white">
                {% for et in exam_types %}
                <option value="{{ et.id }}"{% if timetable and timetable.exam_type_id == et.id %} selected{% endif %}>{{ et.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label text-secondary small text-uppercase fw-bold">From Date</label>
            <input type="date" id="date_from" class="form-control bg-elevated border-subtle text-white" value="{{ timetable.date_from|date:'Y-m-d' }}">
        </div>
        <div class="col-md-3">
            <label class="form-label text-secondary small text-uppercase fw-bold">To Date</label>
            <input type="date" id="date_to" class="form-control bg-elevated border-subtle text-white" value="{{ timetable.date_to|date:'Y-m-d' }}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="button" class="btn btn-outline-custom w-100" onclick="openSelectionStep()">Generate Grid</button>
        </div>
    </div>
    <div class="row g-3 mt-2">
        <div class="col-md-12">
            <label class="form-label text-secondary small text-uppercase fw-bold">Exams Per Day</label>
            <div class="d-flex gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="exams_per_day" id="exams_1" value="1" {% if not timetable or timetable.exams_per_day == 1 %}checked{% endif %}>
                    <label class="form-check-label text-white" for="exams_1">
                        1 exam per day (Morning)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="exams_per_day" id="exams_2" value="2" {% if timetable and timetable.exams_per_day == 2 %}checked{% endif %}>
                    <label class="form-check-label text-white" for="exams_2">
                        2 exams per day (Morning + Afternoon)
                    </label>
                </div>
            </div>
        </div>
    </div>
    <div id="dateError" class="text-danger small mt-2 d-none"></div>
</div>

<div class="card bg-surface border-subtle radius-card shadow-card p-4 mb-4 d-none"
    id="selectionPanel"
    style="background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px;">
    <div class="d-flex flex-wrap justify-content-between align-items-end mb-3 gap-2">
        <div>
            <h5 class="m-0">Filter Program + Semester Rows</h5>
            <div class="small text-secondary">Select programs and semesters, then confirm.</div>
        </div>
        <div class="d-flex gap-2 align-items-end">
            <div class="position-relative">
                <button type="button" id="programsDropdownBtn" class="btn btn-outline-custom btn-sm" style="white-space: nowrap;">
                    <span id="programsBtnLabel">Programs</span> ▾
                </button>
                <div id="programsDropdownPanel" class="d-none"
                    style="position: absolute; top: calc(100% + 6px); left: 0; z-index: 1080; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 10px; min-width: 260px; max-height: 180px; overflow: auto;">
                    <div id="programsChecklist" class="d-flex flex-column gap-1"></div>
                </div>
            </div>
            <div class="position-relative">
                <button type="button" id="semestersDropdownBtn" class="btn btn-outline-custom btn-sm" style="white-space: nowrap;">
                    <span id="semestersBtnLabel">Semesters</span> ▾
                </button>
                <div id="semestersDropdownPanel" class="d-none"
                    style="position: absolute; top: calc(100% + 6px); left: 0; z-index: 1080; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 10px; min-width: 160px; max-height: 180px; overflow: auto;">
                    <div id="semestersChecklist" class="d-flex flex-column gap-1"></div>
                </div>
            </div>
            <button class="btn btn-primary-custom btn-sm" type="button" onclick="confirmSelection()">Confirm</button>
        </div>
    </div>
</div>

<div class="card bg-surface border-subtle radius-card shadow-card p-4 overflow-auto"
    style="background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px;">
    <table class="table table-bordered table-dark text-center align-middle" id="timetableGrid">
        <thead id="gridHead" style="background: var(--bg-elevated);"></thead>
        <tbody id="gridBody"></tbody>
    </table>
</div>

<div id="dateContextMenu" class="d-none">
    <button type="button" class="btn btn-sm btn-outline-danger w-100" onclick="markNoExam()">No Exam</button>
</div>

<script>
    const allGridRows = {{ grid_rows_json|safe }};
    const academicCourses = {{ academic_courses_json|safe }};
    const existingCells = {{ existing_cells_json|safe }};
    let selectedRowKeys = new Set();
    let removedDates = new Set();
    let activeDates = [];
    let selectedRows = [];
    let contextDate = null;
    const dateFromInput = document.getElementById('date_from');
    const dateToInput = document.getElementById('date_to');
    const dateError = document.getElementById('dateError');
    const selectionPanel = document.getElementById('selectionPanel');
    const programsDropdownBtn = document.getElementById('programsDropdownBtn');
    const programsDropdownPanel = document.getElementById('programsDropdownPanel');
    const programsChecklist = document.getElementById('programsChecklist');
    const semestersDropdownBtn = document.getElementById('semestersDropdownBtn');
    const semestersDropdownPanel = document.getElementById('semestersDropdownPanel');
    const semestersChecklist = document.getElementById('semestersChecklist');

    // Apply basic min constraints immediately (and again on DOMContentLoaded).
    // This prevents regressions if the page loads with an early JS error elsewhere.
    (function initDateMinsEarly() {
        if (!dateFromInput || !dateToInput) return;
        const today = new Date();
        const minStart = toDateStringLocal(today);
        dateFromInput.min = minStart;
        if (dateFromInput.value) dateToInput.min = dateFromInput.value;
        else dateToInput.min = minStart;
    })();

    function closeDropdownPanels() {
        programsDropdownPanel.classList.add('d-none');
        semestersDropdownPanel.classList.add('d-none');
    }

    function updateProgramsBtnLabel() {
        const checked = programsChecklist.querySelectorAll('input[type="checkbox"]:checked').length;
        programsDropdownBtn.querySelector('#programsBtnLabel').textContent = checked > 0 ? `Programs (${checked})` : 'Programs';
    }

    function updateSemestersBtnLabel() {
        const checked = semestersChecklist.querySelectorAll('input[type="checkbox"]:checked').length;
        semestersDropdownBtn.querySelector('#semestersBtnLabel').textContent = checked > 0 ? `Semesters (${checked})` : 'Semesters';
    }

    function attachDropdownToggleHandlers() {
        if (!programsDropdownBtn || !semestersDropdownBtn) return;

        programsDropdownBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            programsDropdownPanel.classList.toggle('d-none');
            semestersDropdownPanel.classList.add('d-none');
        });

        semestersDropdownBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            semestersDropdownPanel.classList.toggle('d-none');
            programsDropdownPanel.classList.add('d-none');
        });

        document.addEventListener('click', function (e) {
            const t = e.target;
            const clickedInsidePrograms =
                programsDropdownBtn.contains(t) || programsDropdownPanel.contains(t);
            const clickedInsideSemesters =
                semestersDropdownBtn.contains(t) || semestersDropdownPanel.contains(t);

            if (!clickedInsidePrograms && !clickedInsideSemesters) {
                closeDropdownPanels();
            }
        });
    }

    function coursesForProgramSemester(programId, semester) {
        const pid = parseInt(programId, 10);
        const sem = parseInt(semester, 10);
        return academicCourses.filter(c => parseInt(c.program_id, 10) === pid && parseInt(c.semester, 10) === sem);
    }
    function getExistingCourseId(programId, semester, dateStr) {
        const pid = parseInt(programId, 10);
        const sem = parseInt(semester, 10);
        const cell = existingCells.find(
            c => parseInt(c.program_id, 10) === pid && parseInt(c.semester, 10) === sem && c.date === dateStr
        );
        return cell && cell.course_id ? String(cell.course_id) : '';
    }
    function showDateError(msg) {
        dateError.textContent = msg || '';
        dateError.classList.toggle('d-none', !msg);
    }
    function toDateStringLocal(dt) {
        const y = dt.getFullYear();
        const m = String(dt.getMonth() + 1).padStart(2, '0');
        const d = String(dt.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }
    function validateDateInputs() {
        const df = dateFromInput.value;
        const dt = dateToInput.value;
        if (!df || !dt) {
            showDateError('Please select both Start Date and End Date.');
            return false;
        }
        if (new Date(df) > new Date(dt)) {
            showDateError('End Date cannot be before Start Date.');
            return false;
        }
        showDateError('');
        return true;
    }
    function buildDateRange() {
        const dates = [];
        let d = new Date(dateFromInput.value);
        const end = new Date(dateToInput.value);
        while (d <= end) {
            if (d.getDay() !== 0) {
                const ds = toDateStringLocal(d);
                if (!removedDates.has(ds)) dates.push(ds);
            }
            d.setDate(d.getDate() + 1);
        }
        return dates;
    }
    function resetGridOnly() {
        document.getElementById('gridHead').innerHTML = '';
        document.getElementById('gridBody').innerHTML = '';
    }
    function openSelectionStep() {
        resetGridOnly();
        if (!validateDateInputs()) return;
        hydrateCompactSelectors();
        selectionPanel.classList.remove('d-none');
    }
    // Ensure inline onclick handlers can find these functions even if the script
    // is treated as a module in some deployments.
    window.openSelectionStep = openSelectionStep;

    function hydrateCompactSelectors() {
        const programMap = new Map();
        allGridRows.forEach(r => {
            programMap.set(String(r.program_id), r.program_name);
        });

        programsChecklist.innerHTML = '';
        Array.from(programMap.entries()).sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
            const checked = selectedRows.length ? selectedRows.some(x => String(x.program_id) === id) : true;
            const idSafe = `program_cb_${id}`;
            const label = document.createElement('label');
            label.className = 'd-flex align-items-center gap-2';
            label.htmlFor = idSafe;

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = id;
            cb.id = idSafe;
            cb.checked = checked;
            cb.addEventListener('change', updateProgramsBtnLabel);

            const t = document.createElement('span');
            t.className = 'text-secondary';
            t.textContent = name;

            label.appendChild(cb);
            label.appendChild(t);
            programsChecklist.appendChild(label);
        });

        semestersChecklist.innerHTML = '';
        // Requirement: show Sem 1 through Sem 6.
        for (let sem = 1; sem <= 6; sem++) {
            const semStr = String(sem);
            const checked = selectedRows.length ? selectedRows.some(x => String(x.semester) === semStr) : true;
            const idSafe = `sem_cb_${semStr}`;
            const label = document.createElement('label');
            label.className = 'd-flex align-items-center gap-2';
            label.htmlFor = idSafe;

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = semStr;
            cb.id = idSafe;
            cb.checked = checked;
            cb.addEventListener('change', updateSemestersBtnLabel);

            const t = document.createElement('span');
            t.className = 'text-secondary';
            t.textContent = `Sem ${sem}`;

            label.appendChild(cb);
            label.appendChild(t);
            semestersChecklist.appendChild(label);
        });

        updateProgramsBtnLabel();
        updateSemestersBtnLabel();
    }
    function confirmSelection() {
        const programs = Array.from(programsChecklist.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
        const semesters = Array.from(semestersChecklist.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
        if (!programs.length || !semesters.length) {
            showDateError('Select at least one Program + Semester row.');
            return;
        }
        selectedRows = allGridRows.filter(
            r => programs.includes(String(r.program_id)) && semesters.includes(String(r.semester))
        );
        selectedRowKeys = new Set(selectedRows.map(r => r.row_key));
        showDateError('');
        renderGrid();
    }
    window.confirmSelection = confirmSelection;
    function updateCellDisplay(selectEl) {
        selectEl.classList.toggle('muted-empty', !selectEl.value);
    }
    function renderGrid() {
        if (!validateDateInputs()) return;
        if (!selectedRows.length) return;
        resetGridOnly();
        const thead = document.getElementById('gridHead');
        const tbody = document.getElementById('gridBody');
        activeDates = buildDateRange();
        const headerRow = document.createElement('tr');
        const firstTh = document.createElement('th');
        firstTh.innerText = 'Program';
        firstTh.style.minWidth = '220px';
        headerRow.appendChild(firstTh);
        activeDates.forEach(dateStr => {
            const d = new Date(dateStr + 'T00:00:00');
            const th = document.createElement('th');
            th.dataset.date = dateStr;
            th.style.minWidth = '180px';
            th.innerHTML = `${d.getDate()} ${d.toLocaleString('default', { month: 'short' })}<br><small class="text-secondary">${d.toLocaleString('default', { weekday: 'short' })}</small>`;
            th.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                contextDate = dateStr;
                showContextMenu(e.clientX, e.clientY);
            });
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        selectedRows.forEach(row => {
            const tr = document.createElement('tr');
            const tdName = document.createElement('td');
            tdName.className = 'fw-bold text-start';
            tdName.innerHTML = `${row.department_name} — ${row.program_name} <span class="badge bg-secondary">Sem ${row.semester}</span>`;
            tr.appendChild(tdName);
            const rowCourses = coursesForProgramSemester(row.program_id, row.semester);
            let optionsHtml = '<option value="">--</option>';
            rowCourses.forEach(c => {
                const label = (c.code ? c.code + ' — ' : '') + c.name;
                optionsHtml += `<option value="${c.id}">${label}</option>`;
            });
            activeDates.forEach(dateStr => {
                const td = document.createElement('td');
                const existingId = getExistingCourseId(row.program_id, row.semester, dateStr);
                const select = document.createElement('select');
                select.className = 'form-select form-select-sm bg-elevated border-subtle text-white custom-cell-select';
                select.dataset.programId = row.program_id;
                select.dataset.semester = row.semester;
                select.dataset.date = dateStr;
                select.innerHTML = optionsHtml;
                if (existingId) select.value = existingId;
                updateCellDisplay(select);
                select.addEventListener('change', () => updateCellDisplay(select));
                td.appendChild(select);
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }
    function showContextMenu(x, y) {
        const m = document.getElementById('dateContextMenu');
        m.style.left = `${x}px`;
        m.style.top = `${y}px`;
        m.classList.remove('d-none');
    }
    function hideContextMenu() {
        document.getElementById('dateContextMenu').classList.add('d-none');
    }
    function markNoExam() {
        if (contextDate) {
            removedDates.add(contextDate);
            renderGrid();
        }
        hideContextMenu();
    }
    window.markNoExam = markNoExam;
    function saveTimetable() {
        if (!validateDateInputs()) return;
        if (!selectedRows.length) {
            showDateError('Please generate grid and confirm Program + Semester selection.');
            return;
        }
        const payload = {
            exam_type: document.getElementById('exam_type').value,
            date_from: dateFromInput.value,
            date_to: dateToInput.value,
            exams_per_day: parseInt(document.querySelector('input[name="exams_per_day"]:checked').value),
            removed_dates: Array.from(removedDates),
            selected_rows: selectedRows.map(r => ({ program_id: r.program_id, semester: r.semester })),
            cells: []
        };
        document.querySelectorAll('.custom-cell-select').forEach(sel => {
            payload.cells.push({
                program_id: sel.dataset.programId,
                semester: sel.dataset.semester,
                date: sel.dataset.date,
                course_id: sel.value || null
            });
        });
        fetch('{{ request.path }}', {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/json' }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (typeof showToast === 'function') showToast('Timetable saved successfully!', 'success');
                    else alert('Saved!');
                    const path = window.location.pathname;
                    if (!path.match(/\/builder\/\d+\/?$/)) {
                        window.location.href = `/timetable/builder/${data.id}/`;
                    }
                } else {
                    alert('Error: ' + data.message);
                }
            });
    }
    window.saveTimetable = saveTimetable;
    function exportExcel() {
        const m = window.location.pathname.match(/\/builder\/(\d+)\/?$/);
        if (!m) {
            alert('Please save the timetable first, then export.');
            return;
        }
        window.location.href = `/timetable/builder/${m[1]}/export/excel/`;
    }
    window.exportExcel = exportExcel;
    function exportPDF() {
        const m = window.location.pathname.match(/\/builder\/(\d+)\/?$/);
        if (!m) {
            alert('Please save the timetable first, then export.');
            return;
        }
        window.location.href = `/timetable/builder/${m[1]}/export/pdf/`;
    }
    window.exportPDF = exportPDF;
    document.addEventListener('click', function (e) {
        const menu = document.getElementById('dateContextMenu');
        if (!menu.contains(e.target)) hideContextMenu();
    });
    document.addEventListener('DOMContentLoaded', function () {
        attachDropdownToggleHandlers();
        const today = new Date();
        dateFromInput.min = toDateStringLocal(today);
        if (dateFromInput.value && dateFromInput.value < dateFromInput.min) dateFromInput.value = dateFromInput.min;
        if (dateFromInput.value) dateToInput.min = dateFromInput.value;
        dateFromInput.addEventListener('change', function () {
            if (this.value) dateToInput.min = this.value;
            validateDateInputs();
            selectionPanel.classList.add('d-none');
            selectedRows = [];
            resetGridOnly();
        });
        dateToInput.addEventListener('change', function () {
            validateDateInputs();
            selectionPanel.classList.add('d-none');
            selectedRows = [];
            resetGridOnly();
        });
        if (existingCells.length) {
            existingCells.forEach(c => selectedRowKeys.add(`${c.program_id}-${c.semester}`));
            if (dateFromInput.value && dateToInput.value) {
                const allDates = [];
                let d = new Date(dateFromInput.value);
                const end = new Date(dateToInput.value);
                while (d <= end) {
                    if (d.getDay() !== 0) allDates.push(toDateStringLocal(d));
                    d.setDate(d.getDate() + 1);
                }
                const existingDateSet = new Set(existingCells.map(c => c.date));
                allDates.forEach(ds => {
                    if (!existingDateSet.has(ds)) removedDates.add(ds);
                });
            }
            openSelectionStep();
            confirmSelection();
        }
    });
</script>
<style>
    .custom-cell-select.muted-empty {
        color: #9ca3af !important;
        font-style: italic;
    }
    #dateContextMenu {
        position: fixed;
        z-index: 1080;
        background: var(--bg-elevated);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        padding: 6px;
        width: 120px;
    }
</style>
{% endblock %}
